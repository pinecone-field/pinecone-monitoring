# kubectl patch for the prometheus-server deployment to mount the Pinecone API
# key secret.  Apply with:
#   kubectl patch deployment prometheus-server -n prometheus \
#     --type strategic --patch-file prometheus-secret-volume-patch.yaml
spec:
  template:
    spec:
      volumes:
      - name: config-volume
        configMap:
          name: prometheus-server
          defaultMode: 420
      - name: storage-volume
        persistentVolumeClaim:
          claimName: prometheus-server
      - name: pinecone-api-key
        secret:
          secretName: pinecone-api-key
          defaultMode: 420
      containers:
      - name: prometheus-server
        volumeMounts:
        - mountPath: /etc/config
          name: config-volume
        - mountPath: /data
          name: storage-volume
        - mountPath: /etc/pinecone
          name: pinecone-api-key
          readOnly: true
